# ─────────────────────────────────────────────
# Data Settings
# ─────────────────────────────────────────────
data:
  start_date: "2022-01-01"
  end_date: "2023-12-31"
  min_hours_required: 8760    # 1 year minimum
  gap_fill_max_hours: 6       # interpolate gaps up to this many hours
  anomaly_std_threshold: 4.0  # flag values > N std from rolling 168h mean
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  database_path: "data/energy_forecasting.db"

# ─────────────────────────────────────────────
# Feature Engineering
# ─────────────────────────────────────────────
features:
  lag_hours: [1, 2, 24, 48, 168]     # 1h, 2h, 1d, 2d, 1w
  rolling_windows: [24, 168]          # hours: 1-day and 1-week rolling stats
  fourier_daily_terms: 2              # k=2 sin/cos pairs for 24h seasonality
  fourier_weekly_terms: 3             # k=3 sin/cos pairs for 168h seasonality
  use_holidays: true
  holiday_country: "US"

# ─────────────────────────────────────────────
# Train / Test Split
# ─────────────────────────────────────────────
split:
  test_fraction: 0.20          # chronological holdout (last 20%)
  cv_folds: 5                  # TimeSeriesSplit folds for model selection
  gap_hours: 24                # gap between train and validation in CV folds

# ─────────────────────────────────────────────
# Models
# ─────────────────────────────────────────────
models:
  ridge:
    alpha: 1.0
    fit_intercept: true

  random_forest:
    n_estimators: 200
    max_depth: null            # uncapped
    min_samples_leaf: 5
    n_jobs: -1
    random_state: 42

  hist_gradient_boosting:
    max_iter: 500
    learning_rate: 0.05
    max_depth: 6
    min_samples_leaf: 20
    l2_regularization: 1.0
    random_state: 42
    early_stopping: true
    validation_fraction: 0.1
    n_iter_no_change: 20

# ─────────────────────────────────────────────
# Evaluation
# ─────────────────────────────────────────────
evaluation:
  primary_metric: rmse         # metric used for champion model selection
  output_path: "data/processed/evaluation_results.csv"
  # Baseline models to always include in comparison
  baselines:
    - persistence
    - seasonal_naive_168h
    - eia_df                   # EIA's own forecast — THE benchmark

# ─────────────────────────────────────────────
# Drift Detection & Retraining
# ─────────────────────────────────────────────
monitoring:
  drift_window_days: 7                  # rolling window for RMSE calculation
  drift_threshold_pct: 15.0            # % RMSE degradation that triggers alert
  drift_log_path: "logs/drift_log.jsonl"
  evidently_reports_dir: "evidence_reports"
  retrain_on_drift: true
  retrain_lookback_days: 730           # use last N days for retraining
  champion_replacement_min_improvement: 2.0  # % RMSE improvement required

# ─────────────────────────────────────────────
# MLflow
# ─────────────────────────────────────────────
mlflow:
  tracking_uri: "./mlruns"
  experiment_name: "energy-load-forecasting"
  run_name_prefix: "eia930"

# ─────────────────────────────────────────────
# Multi-Region Benchmark
# ─────────────────────────────────────────────
benchmark:
  # Run modes:
  #   single   — one BA at a time (--region MISO)
  #   priority — BAs in priority order (1 first, 5 last)
  #   all      — all enabled BAs in parallel (if resources allow)
  default_mode: priority
  max_parallel_regions: 4    # for parallel execution
  aggregate_results: true    # also fit a model on all BAs combined
  results_dir: "data/processed/benchmark"
  summary_path: "data/processed/benchmark/benchmark_summary.csv"

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging:
  level: INFO
  log_dir: "logs"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"
