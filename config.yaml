# Energy Load Forecasting — Master Configuration
# All values can be overridden via environment variables or CLI flags

# ─────────────────────────────────────────────
# EIA API
# ─────────────────────────────────────────────
eia:
  base_url: "https://api.eia.gov/v2/electricity/rto/region-data/data/"
  page_size: 5000           # EIA API max rows per request
  rate_limit_delay: 0.5     # seconds between paginated requests
  timeout: 30               # request timeout in seconds
  retry_attempts: 3
  retry_backoff: 2.0        # exponential backoff multiplier
  # Data types to fetch:
  #   D  = actual hourly demand (MWh)
  #   DF = EIA's own demand forecast (MWh)  <-- primary benchmark to beat
  #   NG = net generation (optional exogenous feature)
  #   TI = total interchange (optional exogenous feature)
  data_types:
    - D
    - DF

